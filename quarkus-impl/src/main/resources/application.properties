# Dev Services provides PostgreSQL containers in dev/test — no URL configured on purpose
quarkus.datasource.db-kind=postgresql

# Schema is owned by Flyway migrations (explicit, reviewed artifact — invariants
# mirrored as columns/checks); Hibernate only validates it never generates.
quarkus.flyway.migrate-at-start=true
quarkus.hibernate-orm.schema-management.strategy=validate

quarkus.smallrye-openapi.info-title=TaskFlow API
